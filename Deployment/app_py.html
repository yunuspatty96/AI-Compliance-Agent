<script>
const APP_CODE = `# ============================================================
# AI COMPLIANCE AGENT -- Streamlit App
# RAG-based data protection & privacy risk analyst for universities
# Stack: LangChain + Anthropic Claude + FAISS + HuggingFace Embeddings
#
# Run locally:
#   pip install -r requirements.txt
#   streamlit run app.py
#
# No API key needed in the UI.
# Set ANTHROPIC_API_KEY as an env var or in Streamlit Cloud secrets.
# ============================================================

import os
import tempfile

import streamlit as st
from langchain_anthropic import ChatAnthropic
from langchain_core.prompts import ChatPromptTemplate, MessagesPlaceholder
from langchain_core.output_parsers import StrOutputParser
from langchain_community.document_loaders import PyPDFLoader
from langchain_text_splitters import RecursiveCharacterTextSplitter
from langchain_community.embeddings import HuggingFaceEmbeddings
from langchain_community.vectorstores import FAISS
from langchain_core.messages import HumanMessage, AIMessage

st.set_page_config(
    page_title="AI Compliance Agent",
    page_icon="\\U0001f510",
    layout="wide",
    initial_sidebar_state="expanded",
)

st.markdown("""
<style>
    .main-header {
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        padding: 2rem; border-radius: 12px; text-align: center;
        margin-bottom: 2rem; box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    .main-header h1 { color: #e94560; margin: 0; font-size: 2.2rem; }
    .main-header p  { color: #a8b2d8; margin: 0.5rem 0 0 0; font-size: 1rem; }
    .result-card {
        background: #0f1923; border: 1px solid #1e3a5f; border-radius: 10px;
        padding: 1.5rem; font-family: monospace; white-space: pre-wrap;
        color: #e0e0e0; line-height: 1.7; overflow-x: auto;
    }
    .sidebar-section {
        background: #1a1a2e; border-radius: 8px; padding: 1rem;
        margin-bottom: 1rem; border-left: 3px solid #e94560;
    }
    .status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }
    .badge-ready  { background: #00bb44; color: white; }
    .badge-empty  { background: #555;    color: #ccc;  }
</style>
""", unsafe_allow_html=True)

for key, default in {
    "messages": [], "last_report": None,
    "vectorstore": None, "doc_count": 0, "chunk_count": 0,
}.items():
    if key not in st.session_state:
        st.session_state[key] = default

SYSTEM_PROMPT = """
You are an AI Agent acting as a Data Privacy & Compliance Analyst for a university in Indonesia.
Responsibilities:
1. Analyze privacy and data protection incidents carefully
2. Assess institutional and legal risks objectively
3. Identify ALL relevant articles and clauses from the provided legal documents
4. Cross-reference findings across MULTIPLE documents when applicable
5. Provide concrete, actionable recommendations
RULES:
- Use ONLY the provided legal/document context
- Do NOT invent legal references
- If no relevant clause exists, state: "No directly applicable clauses found."
- Maintain formal, professional English
- Focus specifically on university/government/educational data privacy compliance
"""

REPORT_HUMAN = """
You are generating a formal compliance analysis report.

Legal Context retrieved from the knowledge base:
{context}

Incident/Scenario to analyze:
{question}

Respond using EXACTLY this structured format:

REPORT: DATA PROTECTION & PRIVACY RISK ANALYSIS
================================================

SITUATION SUMMARY:
[Summarize the situation in 2-3 sentences]

---
RISK LEVEL: [LOW / MEDIUM / HIGH / CRITICAL]

Justification:
- Severity Score: [1-5]
- Likelihood Score: [1-5]
- Risk Matrix Result: [Final Level]
Explain clearly why this level was assigned.

---
APPLICABLE LAWS & REGULATIONS:

From Personal Data Protection Law (UU PDP):
[List relevant articles/clauses and explain relevance]

From Electronic Information Law (UU ITE & Amendments):
[List relevant articles/clauses and explain relevance]

From ALU University Regulations:
[List relevant sections and explain relevance]

If a source has no relevant clauses, state: "No directly applicable clauses found."

---
VIOLATIONS IDENTIFIED:
[List each violation clearly, numbered]

---
APPLICABLE SANCTIONS:
[Criminal penalties, administrative sanctions, fines, disciplinary actions]

---
RECOMMENDED ACTIONS:

Immediate corrective actions:
[numbered list]

Long-term preventive measures:
[numbered list]

---
DOCUMENT SOURCES USED:
[List all contributing documents and page references]

================================================
IMPORTANT: Base analysis ONLY on provided context. Do NOT invent legal references.
"""

CHAT_SYSTEM = """You are a Data Privacy & Compliance Analyst for a university in Indonesia.
Answer conversationally, be concise and practical. Reference relevant laws when needed.
Use ONLY the provided legal/document context. Do NOT invent legal references."""

CHAT_HUMAN = "Legal context:\\n{context}\\n\\nUser question:\\n{question}"


@st.cache_resource(show_spinner=False)
def get_llm():
    api_key = (
        os.environ.get("ANTHROPIC_API_KEY")
        or st.secrets.get("ANTHROPIC_API_KEY", "")
    )
    return ChatAnthropic(
        model="claude-sonnet-4-20250514",
        temperature=0,
        max_tokens=4096,
        anthropic_api_key=api_key or None,
    )


def build_chains(llm):
    report_prompt = ChatPromptTemplate.from_messages([
        ("system", SYSTEM_PROMPT),
        ("human", REPORT_HUMAN),
    ])
    chat_prompt = ChatPromptTemplate.from_messages([
        ("system", CHAT_SYSTEM),
        MessagesPlaceholder(variable_name="chat_history", optional=True),
        ("human", CHAT_HUMAN),
    ])
    parser = StrOutputParser()
    return report_prompt | llm | parser, chat_prompt | llm | parser


@st.cache_resource(show_spinner=False)
def get_embeddings():
    return HuggingFaceEmbeddings(model_name="sentence-transformers/all-MiniLM-L6-v2")


def ingest_pdfs(uploaded_files):
    embeddings = get_embeddings()
    all_docs = []
    splitter = RecursiveCharacterTextSplitter(
        chunk_size=1000, chunk_overlap=200, length_function=len,
        separators=["\\n\\n", "\\n", "Article ", "Section ", ". ", " "],
    )
    for uploaded in uploaded_files:
        with tempfile.NamedTemporaryFile(delete=False, suffix=".pdf") as tmp:
            tmp.write(uploaded.read())
            tmp_path = tmp.name
        try:
            pages = PyPDFLoader(tmp_path).load()
            label = uploaded.name.replace("_", " ").replace(".pdf", "")
            for page in pages:
                page.metadata["source_name"] = label
                page.metadata["source_file"] = uploaded.name
            all_docs.extend(pages)
        except Exception as e:
            st.warning(f"Could not parse {uploaded.name}: {e}")
        finally:
            os.unlink(tmp_path)
    if not all_docs:
        return None, 0, 0
    chunks = splitter.split_documents(all_docs)
    return FAISS.from_documents(chunks, embeddings), len(all_docs), len(chunks)


def retrieve_context(question, vectorstore):
    docs = vectorstore.as_retriever(
        search_type="mmr", search_kwargs={"k": 10, "fetch_k": 50}
    ).invoke(question)
    seen, sources = set(), {}
    for doc in docs:
        key = f"{doc.metadata.get('source_file','')}:{doc.page_content[:100]}"
        if key in seen:
            continue
        seen.add(key)
        src = doc.metadata.get("source_name", "Unknown")
        pg  = doc.metadata.get("page", "?")
        sources.setdefault(src, []).append(f"  [Page {pg}]\\n  {doc.page_content.strip()}")
    return "\\n\\n".join(
        f"{'='*60}\\nSOURCE: {src}\\n{'='*60}\\n" + "\\n\\n".join(ex)
        for src, ex in sources.items()
    )


# UI
st.markdown("""
<div class="main-header">
    <h1>\\U0001f510 AI COMPLIANCE AGENT</h1>
    <p>RAG-based Data Protection &amp; Privacy Risk Analyst &middot; Powered by Claude</p>
</div>
""", unsafe_allow_html=True)

with st.sidebar:
    st.markdown("## \\U0001f4c2 Knowledge Base Setup")
    st.markdown("""
    <div class="sidebar-section" style="color:#ccc;font-size:0.9rem;">
    Upload your legal PDF documents. Suggested files:<br><br>
    \\U0001f4dc <b>UU_PDP.pdf</b> &mdash; Personal Data Protection Law<br>
    \\U0001f4bb <b>UU_ITE.pdf</b> &mdash; Electronic Information Law<br>
    \\U0001f4dd <b>UU_ITE_AmandemenI.pdf</b><br>
    \\U0001f4dd <b>UU_ITE_AmandemenII.pdf</b><br>
    \\U0001f3eb <b>ALU_Regulations.pdf</b>
    </div>
    """, unsafe_allow_html=True)

    uploaded_files = st.file_uploader(
        "Upload PDF documents", type=["pdf"],
        accept_multiple_files=True, label_visibility="collapsed",
    )
    if uploaded_files:
        if st.button("\\u2699\\ufe0f Build Knowledge Base", type="primary", use_container_width=True):
            with st.spinner("Processing PDFs and building vector index\\u2026"):
                vs, n_docs, n_chunks = ingest_pdfs(uploaded_files)
                if vs:
                    st.session_state.vectorstore = vs
                    st.session_state.doc_count   = n_docs
                    st.session_state.chunk_count = n_chunks
                    st.success(f"\\u2705 Indexed {n_docs} pages \\u2192 {n_chunks} chunks")
                else:
                    st.error("No usable pages found in the uploaded PDFs.")

    if st.session_state.vectorstore:
        st.markdown(
            f'<span class="status-badge badge-ready">\\u2705 Ready ({st.session_state.chunk_count} chunks)</span>',
            unsafe_allow_html=True)
    else:
        st.markdown('<span class="status-badge badge-empty">\\u26aa No documents loaded</span>',
                    unsafe_allow_html=True)

    st.divider()
    if st.button("\\U0001f5d1\\ufe0f Clear Chat History", use_container_width=True):
        st.session_state.messages    = []
        st.session_state.last_report = None
        st.rerun()

    st.divider()
    st.caption(
        "**No API key UI needed.**\\n\\n"
        "Set ANTHROPIC_API_KEY as an environment variable or in "
        "Streamlit Cloud \\u2192 Settings \\u2192 Secrets.\\n\\n"
        "HuggingFace embeddings run locally -- free, no key required."
    )

col_input, col_output = st.columns([1, 1.5], gap="large")

with col_input:
    st.markdown("### \\U0001f4e5 Incident Scenario")
    EXAMPLES = {
        "\\U0001f4f1 Phone Number Sale":  "A lecturer sold student phone numbers to a third-party marketing company without student consent.",
        "\\U0001f4ca Grade Data Leak":    "An IT staff member accidentally published student grades and national ID numbers on the university's public website.",
        "\\U0001f4f7 Unauthorized CCTV":  "The university installed CCTV cameras in dormitory rooms without notifying or obtaining consent from residents.",
        "\\U0001f4be Database Breach":    "The university's student database was breached and 50,000 records including health data were exposed online.",
        "\\U0001f4e7 Email CC Exposure":  "An admin sent a mass email with all 300 student recipients in CC, exposing everyone's email addresses.",
    }
    for label, text in EXAMPLES.items():
        if st.button(label, use_container_width=True):
            st.session_state["scenario_text"] = text

    scenario = st.text_area(
        "Describe the privacy/data protection incident:",
        value=st.session_state.get("scenario_text", ""),
        height=180, key="scenario_text",
        placeholder="e.g. A staff member shared student records with a third party without authorization\\u2026",
    )
    analyze_btn = st.button(
        "\\U0001f50d Generate Compliance Report", type="primary",
        use_container_width=True, disabled=not st.session_state.vectorstore,
    )
    if not st.session_state.vectorstore:
        st.caption("\\u2b06\\ufe0f Upload PDFs and click 'Build Knowledge Base' in the sidebar first.")

with col_output:
    tab_report, tab_chat = st.tabs(["\\U0001f4ca Compliance Report", "\\U0001f4ac Chat with Agent"])

    with tab_report:
        if analyze_btn:
            if not scenario.strip():
                st.warning("Please describe an incident first.")
            else:
                with st.spinner("Retrieving legal context and generating report\\u2026"):
                    try:
                        report_chain, _ = build_chains(get_llm())
                        ctx = retrieve_context(scenario, st.session_state.vectorstore)
                        st.session_state.last_report = report_chain.invoke(
                            {"context": ctx, "question": scenario}
                        )
                    except Exception as e:
                        st.error(f"Error generating report: {e}")

        if st.session_state.last_report:
            st.download_button(
                "\\u2b07\\ufe0f Download Report (.txt)",
                data=st.session_state.last_report,
                file_name="compliance_report.txt", mime="text/plain",
            )
            st.markdown(
                f'<div class="result-card">{st.session_state.last_report}</div>',
                unsafe_allow_html=True,
            )
        else:
            st.info("Submit an incident scenario on the left to generate a report.")

    with tab_chat:
        st.caption("Ask follow-up questions or explore regulatory details interactively.")
        for msg in st.session_state.messages:
            with st.chat_message(msg["role"]):
                st.markdown(msg["content"])

        user_input = st.chat_input(
            "Ask anything about data protection, privacy laws, or compliance\\u2026",
            disabled=not st.session_state.vectorstore,
        )
        if user_input:
            st.session_state.messages.append({"role": "user", "content": user_input})
            with st.chat_message("user"):
                st.markdown(user_input)
            with st.chat_message("assistant"):
                with st.spinner("Thinking\\u2026"):
                    try:
                        _, chat_chain = build_chains(get_llm())
                        ctx = retrieve_context(user_input, st.session_state.vectorstore)
                        history = [
                            (HumanMessage if m["role"] == "user" else AIMessage)(content=m["content"])
                            for m in st.session_state.messages[:-1]
                        ]
                        reply = chat_chain.invoke({
                            "context": ctx, "question": user_input, "chat_history": history,
                        })
                        st.markdown(reply)
                        st.session_state.messages.append({"role": "assistant", "content": reply})
                    except Exception as e:
                        st.error(f"Error: {e}")

st.divider()
st.markdown(
    '<div style="text-align:center;color:#808080;font-size:0.8rem;">'
    "Powered by Claude (Anthropic) \\u00b7 For educational and compliance guidance only. "
    "Not a substitute for qualified legal counsel."
    "</div>",
    unsafe_allow_html=True,
)
`;

const REQS = `streamlit>=1.35.0
langchain>=0.2.0
langchain-core>=0.2.0
langchain-community>=0.2.0
langchain-anthropic>=0.1.15
langchain-text-splitters>=0.2.0
faiss-cpu>=1.7.4
pypdf>=4.0.0
sentence-transformers>=2.7.0
anthropic>=0.28.0
`;

function downloadApp() {
  const blob = new Blob([APP_CODE], {type: 'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'app.py';
  a.click();
}

function downloadReqs() {
  const blob = new Blob([REQS], {type: 'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'requirements.txt';
  a.click();
}
</script>
